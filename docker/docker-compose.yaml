version: '3.9'

services:

  kafka-1:
    image: apache/kafka:3.7.0
    container_name: kafka-1
    hostname: kafka-1

    ports:
      - "9092:19092"

    volumes:
      - ./data/kafka-1-data:/var/lib/kafka/data
      - ./kafka-1.properties:/etc/kafka/kafka.properties

    command: >
      bash -c "export PATH=/opt/kafka/bin:$PATH &&
      kafka-server-start.sh /etc/kafka/kafka.properties"

    networks:
      - kafka-network


  kafka-2:
    image: apache/kafka:3.7.0
    container_name: kafka-2
    hostname: kafka-2

    ports:
      - "9093:19092"

    volumes:
      - ./data/kafka-2-data:/var/lib/kafka/data
      - ./kafka-2.properties:/etc/kafka/kafka.properties

    command: >
      bash -c "export PATH=/opt/kafka/bin:$PATH &&
      kafka-server-start.sh /etc/kafka/kafka.properties"

    networks:
      - kafka-network


  kafka-3:
    image: apache/kafka:3.7.0
    container_name: kafka-3
    hostname: kafka-3

    ports:
      - "9094:19092"

    volumes:
      - ./data/kafka-3-data:/var/lib/kafka/data
      - ./kafka-3.properties:/etc/kafka/kafka.properties

    command: >
      bash -c "export PATH=/opt/kafka/bin:$PATH &&
      kafka-server-start.sh /etc/kafka/kafka.properties"

    networks:
      - kafka-network


networks:
  kafka-network:
    driver: bridge
